<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog - 熊福华</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="navbar-inner">
            <a href="index.html" class="nav-brand">xiongfuhua</a>
            <div class="nav-links">
                <a href="index.html#experience" class="nav-link">experience</a>
                <a href="index.html#education" class="nav-link">education</a>
                <a href="index.html#skills" class="nav-link">skills</a>
                <a href="blog.html" class="nav-link nav-active">blog</a>
                <a href="index.html#contact" class="nav-link nav-contact">contact</a>
            </div>
        </div>
    </nav>

    <main class="blog-page">
        <div class="container">
            <header class="blog-header">
                <h1 class="blog-page-title">blog</h1>
                <p class="blog-page-desc">关于 AI 产品、技术探索和产品思考的记录</p>
            </header>

            <div class="blog-list" id="blog-list">
                <!-- 文章列表由 JS 动态渲染 -->
            </div>

            <div class="blog-empty" id="blog-empty" style="display: none;">
                <p>暂无文章</p>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2025 熊福华 &middot; Built with code</p>
        </div>
    </footer>

    <script>
        // 加载文章列表
        async function loadPosts() {
            try {
                const response = await fetch('blog/posts.json');
                const posts = await response.json();

                const blogList = document.getElementById('blog-list');
                const blogEmpty = document.getElementById('blog-empty');

                if (posts.length === 0) {
                    blogEmpty.style.display = 'block';
                    return;
                }

                // 按日期倒序
                posts.sort((a, b) => new Date(b.date) - new Date(a.date));

                posts.forEach(post => {
                    const article = document.createElement('article');
                    article.className = 'blog-item';
                    article.innerHTML = `
                        <a href="blog-post.html?id=${post.id}" class="blog-item-link">
                            <div class="blog-item-content">
                                <time class="blog-item-date">${formatDate(post.date)}</time>
                                <h2 class="blog-item-title">${escapeHtml(post.title)}</h2>
                                <p class="blog-item-desc">${escapeHtml(post.description)}</p>
                                <div class="blog-item-tags">
                                    ${post.tags.map(tag => `<span class="blog-tag">${escapeHtml(tag)}</span>`).join('')}
                                </div>
                            </div>
                            <div class="blog-item-arrow">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <polyline points="9 6 15 12 9 18"/>
                                </svg>
                            </div>
                        </a>
                    `;
                    blogList.appendChild(article);
                });
            } catch (e) {
                console.error('Failed to load posts:', e);
                document.getElementById('blog-empty').style.display = 'block';
            }
        }

        function formatDate(dateStr) {
            const d = new Date(dateStr);
            const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun',
                           'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
            return `${months[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        loadPosts();
    </script>
</body>
</html>
